<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Asilo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

.navMes {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
}

.total {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
}

input {
    background: #ffffff10;
    color: white;
}

button {
    background: #00c853;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.item {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    position: relative;
}

.valor {
    color: #00e676;
    font-weight: bold;
}

.excluir {
    position: absolute;
    right: 10px;
    top: 10px;
    background: #ff5252;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <div class="navMes">
        <span onclick="mesAnterior()">⬅️</span>
        <span id="mes">Mês</span>
        <span onclick="proximoMes()">➡️</span>
    </div>
    <div class="total" id="total">💰 R$ 0,00</div>
</div>

<div class="card">
    <input type="date" id="data">
    <input type="text" id="item" placeholder="🧾 Item enviado">
    <input type="number" id="valor" placeholder="💰 Valor em R$">
    <button onclick="adicionar()">➕ Adicionar</button>
</div>

<div id="lista"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj0SLLcTQbnbDXnZuI07SS_nb-nRwq_E",
  authDomain: "controle-asilo.firebaseapp.com",
  projectId: "controle-asilo",
  storageBucket: "controle-asilo.appspot.com",
  messagingSenderId: "345233964240",
  appId: "1:345233964240:web:92bad2b915ebf3095972d5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dataAtual = new Date();

// gerar mês chave
function getMesKey(date) {
    return date.getFullYear() + "-" + (date.getMonth()+1);
}

// mudar mês
window.mesAnterior = function() {
    dataAtual.setMonth(dataAtual.getMonth() - 1);
    render();
}

window.proximoMes = function() {
    dataAtual.setMonth(dataAtual.getMonth() + 1);
    render();
}

// adicionar
window.adicionar = async function() {
    let data = document.getElementById("data").value;
    let item = document.getElementById("item").value;
    let valor = parseFloat(document.getElementById("valor").value);

    if (!data || !item || !valor) return;

    await addDoc(collection(db, "registros"), {
        data,
        item,
        valor,
        mes: getMesKey(dataAtual)
    });

    document.getElementById("item").value = "";
    document.getElementById("valor").value = "";

    render();
}

// excluir
window.excluir = async function(id) {
    await deleteDoc(doc(db, "registros", id));
    render();
}

// render
async function render() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let total = 0;

    const mesNome = dataAtual.toLocaleDateString('pt-BR', {
        month: 'long',
        year: 'numeric'
    });

    document.getElementById("mes").innerText = "📆 " + mesNome;

    const q = query(
        collection(db, "registros"),
        where("mes", "==", getMesKey(dataAtual))
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
        let d = docSnap.data();

        total += d.valor;

        const dataFormatada = new Date(d.data).toLocaleDateString('pt-BR');

        lista.innerHTML += `
        <div class="item">
            <div class="excluir" onclick="excluir('${docSnap.id}')">❌</div>
            📅 ${dataFormatada}<br>
            🧾 ${d.item}<br>
            <span class="valor">💰 R$ ${d.valor.toFixed(2)}</span>
        </div>`;
    });

    document.getElementById("total").innerText =
        "💰 R$ " + total.toFixed(2);
}

render();

</script>

</body>
</html>
