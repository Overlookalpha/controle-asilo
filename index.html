<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Asilo</title>

<style>
body {
    font-family: Arial;
    background: #0f2027;
    color: white;
    padding: 20px;
}
.container {
    max-width: 400px;
    margin: auto;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button {
    background: #00c853;
    color: white;
    font-weight: bold;
}
.item {
    background: #203a43;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
.total {
    font-size: 22px;
    margin-bottom: 20px;
}
</style>

</head>
<body>

<div class="container">

<div class="total" id="total">Total: R$ 0,00</div>

<input type="date" id="data">
<input type="text" id="item" placeholder="Item enviado">
<input type="number" id="valor" placeholder="Valor em R$">

<button onclick="adicionar()">➕ Adicionar</button>

<div id="lista"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 TEU FIREBASE (já integrado)
const firebaseConfig = {
  apiKey: "AIzaSyBj0SLLcTQbnbDXnZuI07SS_nb-nRwq_E",
  authDomain: "controle-asilo.firebaseapp.com",
  projectId: "controle-asilo",
  storageBucket: "controle-asilo.appspot.com",
  messagingSenderId: "345233964240",
  appId: "1:345233964240:web:92bad2b915ebf3095972d5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📅 mês atual
function mesAtual() {
    let d = new Date();
    return d.getFullYear() + "-" + (d.getMonth()+1);
}

// ➕ adicionar
window.adicionar = async function() {
    let data = document.getElementById("data").value;
    let item = document.getElementById("item").value;
    let valor = parseFloat(document.getElementById("valor").value);

    if (!data || !item || !valor) return;

    await addDoc(collection(db, "registros"), {
        data,
        item,
        valor,
        mes: mesAtual()
    });

    limpar();
    render();
}

// limpar campos
function limpar() {
    document.getElementById("item").value = "";
    document.getElementById("valor").value = "";
}

// renderizar lista
async function render() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let total = 0;

    const q = query(
        collection(db, "registros"),
        where("mes", "==", mesAtual())
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
        let d = doc.data();

        total += d.valor;

        lista.innerHTML += `
        <div class="item">
            ${d.data} - ${d.item} <br>
            R$ ${d.valor.toFixed(2)}
        </div>`;
    });

    document.getElementById("total").innerText =
        "Total: R$ " + total.toFixed(2);
}

render();

</script>

</body>
</html>
